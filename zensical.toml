[project]
site_name = "globlin"
site_url = "https://vlaci.github.io/globlin"
repo_url = "https://github.com/vlaci/globlin"
extra_css = ["stylesheets/mkdocstrings.css"]
nav = [
  "index.md",
  "guide.md",
  "api-reference.md",
  "changelog.md",
  "migration.md",
]

[project.theme]
logo = "images/logo.svg"
favicon = "images/logo.png"

# Palette toggle for automatic mode
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["python"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_section_style = "list"
filters = ["!^_"]
docstring_style = "google"
extensions = ["griffe_warnings_deprecated"]
heading_level = 2
inherited_members = true
members_order = "source"
merge_init_into_class = true
parameter_headings = true
type_parameter_headings = true
separate_signature = true
show_root_full_path = false
show_root_heading = true
show_signature_annotations = true
show_source = true
show_symbol_type_heading = true
show_symbol_type_toc = true
signature_crossrefs = true
summary = true

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.attr_list]

[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.snippets]
base_path = "docs"
restrict_base_path = false
check_paths = true

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true


[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/vlaci/globlin"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/globlin/"
